language: "en-US"
tone_instructions: "Be concise, practical, and security-focused. Prefer actionable suggestions and small diffs."
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: true

  high_level_summary: true
  review_status: true
  commit_status: true
  fail_commit_status: false

  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true

  related_prs: false

  in_progress_fortune: true
  poem: false
  enable_prompt_for_ai_agents: true

  # Exclude generated/build artifacts & deps to keep reviews clean
  path_filters:
    - "!**/node_modules/**"
    - "!**/.next/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/.turbo/**"
    - "!**/.cache/**"
    - "!**/*.min.*"
    - "!**/package-lock.json"
    - "!**/yarn.lock"
    - "!**/pnpm-lock.yaml"

  # Extra guidance by area
  path_instructions:
    - path: "app/**"
      instructions: |
        Focus on Next.js App Router correctness:
        - SSR/CSR boundaries: avoid accidental client-bundling, minimize unnecessary "use client".
        - Ensure server-only modules (env, DB, secrets, logging) are not imported into Client Components.
        - Data fetching: prefer server components; avoid fetch waterfalls; use caching/revalidation intentionally.
        - Performance: avoid unnecessary re-renders, memoize only when needed, keep client bundles small.
        - Accessibility: semantic HTML, labels, keyboard navigation; ARIA only when necessary.
        - Security: never expose secrets via props or public env vars; avoid leaking sensitive data in rendered HTML.

    - path: "app/api/**"
      instructions: |
        Focus on API (Route Handlers) correctness and security:
        - Input validation (schema validation), correct status codes, consistent response shapes.
        - Authn/authz enforcement and permission checks.
        - Cookie/session handling: secure flags, CSRF considerations for cookie-based auth.
        - Error handling: avoid leaking stack traces/secrets; consistent error format.
        - Logging: structured logs (pino), include request context, ensure redaction of secrets.
        - Flag injection/SSRF/path traversal risks; validate URLs, file paths, headers, and user-controlled inputs.
        - Recommend tests for critical logic (auth, permissions, data access).

    - path: "lib/**"
      instructions: |
        Focus on shared core modules (env/db/logging/utilities):
        - Ensure server-only code is guarded (e.g., "server-only") and never imported into client modules.
        - Env validation: fail-fast, no circular initialization (avoid referencing env while building env).
        - Logging: redact secrets; avoid concatenating secrets into strings.
        - DB access: connection reuse, timeouts, safe query patterns, indexes for performance.
        - Avoid global mutable state unless explicitly safe in server runtime.

    # Future: auth layer (recommended to keep separate from route handlers)
    - path: "{auth/**,lib/auth/**,app/(auth)/**}"
      instructions: |
        Focus on authentication & authorization:
        - Secure session management (httpOnly cookies, SameSite, Secure in prod).
        - CSRF protection where relevant (especially cookie-based auth + state-changing requests).
        - Password flows (if used): strong hashing (argon2/bcrypt), rate limiting, lockout, reset token handling.
        - OAuth flows: state/nonce verification, redirect URL validation, minimal scopes.
        - Avoid leaking tokens/secrets into client bundle or logs.

    # Future: DB layer / repositories / models
    - path: "{db/**,lib/db/**,models/**,repositories/**}"
      instructions: |
        Focus on database correctness and safety:
        - Validate user input before DB usage; prevent injection via query builders.
        - Ensure proper indexes; flag N+1 query patterns and unbounded queries.
        - Handle connection lifecycle and timeouts correctly for Next.js runtime.
        - Prefer explicit error mapping (e.g., duplicate key -> 409).

    # Future: background jobs / queues (if you add them later)
    - path: "{jobs/**,workers/**,queue/**}"
      instructions: |
        Focus on job safety and reliability:
        - Idempotency, retries/backoff, dead-letter handling, timeouts.
        - Avoid processing untrusted input without validation.
        - Ensure logs are structured and do not include secrets/PII.

    # Future: middleware and request lifecycle
    - path: "{middleware.ts,app/middleware.ts}"
      instructions: |
        Focus on correctness and performance:
        - Middleware runs on every matching request; keep it lightweight.
        - Avoid network/DB calls in middleware unless absolutely required.
        - Ensure redirects/rewrites do not create open-redirect issues.

    # Future: tests (unit/integration/e2e)
    - path: "{tests/**,__tests__/**,e2e/**}"
      instructions: |
        Focus on test quality and critical coverage:
        - Auth flows, permissions, and API error cases should be covered.
        - Use realistic fixtures; avoid brittle snapshot tests for dynamic content.
        - Ensure tests do not hardcode secrets and clean up DB state.

    # Future: docs / open-source hygiene
    - path: "{README.md,docs/**,.github/**}"
      instructions: |
        Focus on clarity and security:
        - Document required env vars and safe defaults.
        - Provide minimal setup steps for one-container usage + external MongoDB.
        - Ensure no secrets, tokens, or private URLs are committed.

    # CI/CD configs (future)
    - path: "{.github/workflows/**,ci/**}"
      instructions: |
        Focus on secure automation:
        - No secrets in logs, no unsafe pull_request secret exposure.
        - Caching correctness, reproducible installs, pinned actions where feasible.

    - path: "**/Dockerfile"
      instructions: |
        Check for pinned base images, non-root user, minimal layers, and avoiding build-time secret leaks.
        Prefer multi-stage builds, small runtime images, and explicit NODE_ENV/PORT handling.

    - path: "{docker-compose.yml,compose.yml,compose.yaml}"
      instructions: |
        Focus on safe container runtime config:
        - No secrets baked into images; use env vars/secret files properly.
        - Healthchecks, restart policy, minimal exposed ports.
        - Ensure MongoDB connectivity and required env vars are documented.

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    ignore_title_keywords:
      - "wip"
      - "do not merge"
      - "draft"

  labeling_instructions:
    - label: "frontend"
      instructions: "UI, Next.js/React, styling, client-side logic."
    - label: "api"
      instructions: "API/server logic, auth, DB, migrations."
    - label: "infra"
      instructions: "Docker, CI/CD, Nginx, deployment, IaC."
    - label: "docs"
      instructions: "Markdown/docs-only changes."
    - label: "tests"
      instructions: "Test additions/changes."

  auto_apply_labels: true

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  pre_merge_checks:
    title:
      mode: "warning"
      requirements: "Concise, imperative, and scoped when useful (e.g., 'frontend:', 'backend:')."
    description:
      mode: "warning"
    issue_assessment:
      mode: "warning"
    docstrings:
      mode: "off"
    custom_checks:
      - mode: "warning"
        name: "No hard-coded secrets"
        instructions: |
          Fail if new changes include hard-coded credentials, API keys, private keys, or tokens.
          If a secret-like value is needed for testing, ensure it is obviously fake and test-only.

  tools:
    ast-grep:
      essential_rules: true
      rule_dirs: []
      util_dirs: []
    gitleaks:
      enabled: true
    eslint:
      enabled: true
    biome:
      enabled: false # flip to true if you use Biome instead of ESLint
    hadolint:
      enabled: true
    shellcheck:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 180000

chat:
  auto_reply: true
